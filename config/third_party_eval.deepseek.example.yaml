# Example internal API third-party rollout config for issue #27.
# Keep private credentials and API modules under ignored .secrets/.
provider:
  source: internal_api
  api_module: .secrets/internal_api_eval.py

model:
  model_name: deepseek-v4-flash-passthrough
  timeout: 300
  sampling_params:
    temperature: null
    max_tokens: null
    thinking:
      type: enabled
    reasoning_effort: max
    max_completion_tokens: 384000

agent:
  deployment: arl
  tools:
    - name: str_replace_editor
    - name: execute_bash
    - name: submit
  interaction:
    action_timeout: 300
    timeout_budget: 3
    max_turns: 100
  tool_install_timeout: 300
  # Tree-sitter only improves large-file previews; the editor still supports basic view/edit commands.
  skip_tool_install_commands:
    - str_replace_editor
  reward_eval_timeout: 600
  log_dir: /tmp/p2a_third_party_eval

analysis:
  tracking_mode: view_and_bash
  near_threshold: 0.5
  m_max: 3.0
