# Example batch config for API-backed Uni-Agent/P2A evaluation.
# Keep internal API credentials and private model lists under ignored .secrets/.
# The model below demonstrates per-model sampling params consumed by the tracked adapter.
provider:
  source: internal_api
  api_module: .secrets/internal_api_eval.py

model:
  timeout: 300
  sampling_params:
    temperature: null
    max_tokens: null

dataset:
  name: swebench-hard

experiment:
  id: public-swebench-hard-demo
  stage: smoke
  limit: all
  offset: 0
  max_turns: 100
  run_timeout: 15m
  per_model_concurrency: 8
  model_parallelism: 2

models:
  - api_name: deepseek-v4-flash-passthrough
    label: deepseek-v4-flash-passthrough
    sampling_params:
      temperature: null
      max_tokens: null
      thinking:
        type: enabled
      reasoning_effort: max
      max_completion_tokens: 384000

storage:
  # Relative storage paths are project artifacts, resolved under:
  # ${P2A_ARTIFACTS_DIR:-<src>/data}.
  db: data/evals/traces.sqlite
  artifacts_dir: data/third_party
