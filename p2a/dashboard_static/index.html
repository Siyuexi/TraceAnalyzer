<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P2A unified dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div>
    <h1>P2A unified dashboard</h1>
    <div id="source-line" class="source-line"></div>
  </div>
  <div class="top-actions">
    <fieldset class="case-filter" aria-label="Case filter">
      <legend>Case filter</legend>
      <label class="toggle"><input class="case-filter-checkbox" id="case-filter-direct" type="checkbox" data-case-filter="direct" checked> Direct</label>
      <label class="toggle"><input class="case-filter-checkbox" id="case-filter-standard" type="checkbox" data-case-filter="standard" checked> Standard</label>
      <label class="toggle"><input class="case-filter-checkbox" id="case-filter-others" type="checkbox" data-case-filter="others"> Others</label>
    </fieldset>
    <button id="refresh-button" type="button">Refresh</button>
    <label class="toggle"><input id="auto-refresh" type="checkbox"> Live</label>
  </div>
</header>
<nav class="tabs" aria-label="Dashboard views">
  <button class="tab is-active" data-tab="overview" type="button">Overview</button>
  <button class="tab" data-tab="models" type="button">Metrics</button>
  <button class="tab" data-tab="traces" type="button">Traces</button>
  <button class="tab" data-tab="runs" type="button">Logs</button>
</nav>
<main>
  <section class="selected-bar">
    <div>
      <div class="selected-label">Selected scope</div>
      <div id="selected-experiment">None</div>
    </div>
    <button id="clear-experiment" type="button">Clear</button>
  </section>
  <section id="overview" class="tab-panel is-active">
    <div id="summary-grid" class="metric-grid"></div>
    <section class="section">
      <h2>Datasets and eval cells</h2>
      <div id="experiment-table" class="table-wrap"></div>
    </section>
    <section class="section">
      <h2>Ingestion trend</h2>
      <div id="trend-table" class="table-wrap"></div>
    </section>
    <section class="section">
      <h2>Distributions</h2>
      <div id="distribution-grid" class="split-grid"></div>
    </section>
  </section>
  <section id="models" class="tab-panel">
    <section class="section">
      <h2>Metrics analysis</h2>
      <div id="model-table"></div>
    </section>
  </section>
  <section id="traces" class="tab-panel">
    <section class="section trace-toolbar">
      <h2>Trace drill-down</h2>
      <input id="trace-search" type="search" placeholder="Filter by instance, file, or pattern">
    </section>
    <div id="trace-legend"></div>
    <div id="trace-inspector" class="trace-inspector"></div>
  </section>
  <section id="runs" class="tab-panel">
    <section class="section">
      <h2>Logs</h2>
      <div id="run-list"></div>
    </section>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
