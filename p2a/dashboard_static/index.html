<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P2A unified dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div>
    <h1>P2A unified dashboard</h1>
    <div id="source-line" class="source-line"></div>
    <div id="operation-status" class="operation-status" hidden></div>
  </div>
  <div class="top-actions">
    <fieldset class="case-filter" aria-label="Case filter">
      <legend>Case filter</legend>
      <label class="toggle"><input class="case-filter-checkbox" id="case-filter-direct" type="checkbox" data-case-filter="direct" checked> Direct</label>
      <label class="toggle"><input class="case-filter-checkbox" id="case-filter-latent" type="checkbox" data-case-filter="latent" checked> Latent</label>
      <label class="toggle"><input class="case-filter-checkbox" id="case-filter-exposed" type="checkbox" data-case-filter="exposed" checked> Exposed</label>
      <label class="toggle"><input class="case-filter-checkbox" id="case-filter-others" type="checkbox" data-case-filter="others" checked> Others</label>
    </fieldset>
    <button id="refresh-button" type="button">Refresh</button>
    <button id="rebuild-button" type="button" hidden>Rebuild</button>
    <span id="rebuild-inline-status" class="rebuild-inline-status" hidden></span>
    <label class="toggle"><input id="auto-refresh" type="checkbox"> Live</label>
    <form id="admin-login" class="admin-login">
      <input id="admin-password" type="password" autocomplete="current-password" placeholder="Admin password">
      <button id="admin-login-button" type="submit">Log in</button>
      <button id="admin-logout-button" type="button" hidden>Logout</button>
      <span id="admin-status" class="admin-status"></span>
    </form>
  </div>
</header>
<nav class="tabs" aria-label="Dashboard views">
  <button class="tab is-active" data-tab="overview" type="button">Overview</button>
  <button class="tab" data-tab="models" type="button">Metrics</button>
  <button class="tab" data-tab="traces" type="button">Traces</button>
  <button class="tab" data-tab="runs" type="button">Logs</button>
</nav>
<main>
  <section class="selected-bar">
    <div>
      <div class="selected-label">Current selection</div>
      <div id="selected-experiment">None</div>
    </div>
    <button id="clear-experiment" type="button">Clear</button>
    <form id="permalink-jump" class="permalink-jump">
      <input id="permalink-input" type="text" placeholder="Paste dashboard URL">
      <button type="submit">Go</button>
    </form>
  </section>
  <div id="permalink-notice" class="notice" hidden></div>
  <section id="overview" class="tab-panel is-active">
    <div id="summary-grid" class="metric-grid"></div>
    <section id="admin-panel" class="section admin-panel" hidden></section>
    <section class="section">
      <h2>Datasets and eval cells</h2>
      <div id="experiment-table" class="table-wrap"></div>
    </section>
    <section class="section">
      <h2>Ingestion trend</h2>
      <div id="trend-table" class="table-wrap"></div>
    </section>
    <section class="section">
      <h2>Distributions</h2>
      <div id="distribution-grid" class="split-grid"></div>
    </section>
  </section>
  <section id="models" class="tab-panel">
    <section class="section">
      <h2>Metrics analysis</h2>
      <div id="model-table"></div>
    </section>
  </section>
  <section id="traces" class="tab-panel">
    <section class="section trace-toolbar">
      <h2>Trace drill-down</h2>
      <input id="trace-search" type="search" placeholder="Filter by instance, file, or pattern">
      <fieldset class="trace-pattern-filter" aria-label="Trace pattern filter">
        <legend>Pattern tags</legend>
        <label class="toggle"><input class="trace-pattern-checkbox" type="checkbox" data-pattern-filter="miracle"> ✨</label>
        <label class="toggle"><input class="trace-pattern-checkbox" type="checkbox" data-pattern-filter="reverse"> 🌀</label>
        <label class="toggle"><input class="trace-pattern-checkbox" type="checkbox" data-pattern-filter="loop"> 🔁</label>
        <label class="toggle"><input class="trace-pattern-checkbox" type="checkbox" data-pattern-filter="hit_symptom"> 🔎</label>
        <label class="toggle"><input class="trace-pattern-checkbox" type="checkbox" data-pattern-filter="hit_root_cause"> 🎯</label>
        <label class="toggle"><input class="trace-pattern-checkbox" type="checkbox" data-pattern-filter="edited_root_cause"> ✎</label>
      </fieldset>
    </section>
    <div id="trace-legend"></div>
    <div id="trace-inspector" class="trace-inspector"></div>
  </section>
  <section id="runs" class="tab-panel">
    <section class="section">
      <h2>Logs</h2>
      <div id="run-list"></div>
    </section>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
